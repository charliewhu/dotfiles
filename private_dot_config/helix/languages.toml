[[language]]
name = "typescript"
language-servers = [
  "typescript-language-server",
  "vscode-eslint-language-server",
]
formatter = { command = "bunx", args = ["prettier", "--parser", "typescript"] }
auto-format = true

[[language]]
name = "javascript"
language-servers = [
  "typescript-language-server",
  "vscode-eslint-language-server",
]
formatter = { command = "bunx", args = ["prettier", "--parser", "typescript"] }
auto-format = true

[[language]]
name = "svelte"
injection-regex = "svelte"
file-types = ["svelte"]
roots = ["package.json", "svelte.config.js"]
indent = { tab-width = 2, unit = "  " }
# comment-token = "<!-- -->"
language-servers = ["svelteserver", "tailwindcss-ls"]
formatter = { command = "bunx", args = ["prettier", "--plugin", "prettier-plugin-svelte", "--parser", "svelte"] }
auto-format = true

[[language]]
name = "html"
language-servers = [
  { name = "superhtml", except-features = ["format"] },
  "vscode-html-language-server",
  'tailwindcss-ls',
  'emmet-lsp',
]
auto-format = true

[language-server.tailwindcss-ls]
command = "tailwindcss-language-server"
args = ["--stdio"]

[[language]]
name = "css"
language-servers = [ "vscode-css-language-server", "tailwindcss-ls" ]

[[language]]
name = "python"
language-servers = ["basedpyright", 'ruff']
file-types = ["py", "ipynb"]
roots = ['pyproject.toml']
workspace-lsp-roots = ['pyproject.toml']
auto-format = true
formatter = { command = "sh", args = [
  "-c",
  "uvx ruff check --fix - | uvx ruff format -",
] }


[language-server.basedpyright]
command = "uvx"
args = ["--from", "basedpyright", "basedpyright-langserver", "--stdio"]

[language-server.basedpyright.config.basedpyright.analysis]
autoImportCompletions = true
diagnosticMode = "workspace"
typeCheckingMode = "standard"
inlayHints.callArgumentNames = false
inlayHints.genericTypes = true
verboseOutput = true


[language-server.ruff]
command = "uvx"
args = ["ruff", "server"]
environment = { "RUFF_TRACE" = "messages" }


[language-server.typescript-language-server.config.typescript.inlayHints]
includeInlayParameterNameHints = "none"
includeInlayParameterNameHintsWhenTypeMatchesName=true
includeInlayFunctionLikeReturnTypeHints = true
includeInlayFunctionParameterTypeHints = false

[[language]]
name = "gherkin"
formatter = { command = "bunx", args = ["prettier", "--parser", "gherkin"] }
auto-format = true

